<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <title>台灣股市客戶持倉追蹤系統 (AI 實時版)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* 這裡加入您的 CSS 樣式，確保界面美觀 */
    body { font-family: 'Noto Sans TC', sans-serif; background: #f3f4f6; color: #1f2937; margin: 0; padding: 20px; }
    .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h1 { color: #10b981; text-align: center; }
    /* ... 其他樣式 ... */
  </style>
</head>
<body>
  <div class="container">
    <h1>台灣股市持倉追蹤</h1>
    <div id="app">正在載入系統...</div>
  </div>

  <script>
    // --- 關鍵路徑設定 ---
    const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:10000'
      : ''; 

    // 確保所有 fetch 請求都使用 API_BASE
    async function loadData(userId) {
      const res = await fetch(`${API_BASE}/api/get_data?userId=${userId}`);
      const data = await res.json();
      console.log("數據已載入", data);
      // 渲染邏輯...
    }

    // 修正後的抓取報價函數
    async function fetchPrices(codes) {
      try {
        const response = await fetch(`${API_BASE}/api/prices`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ codes })
        });
        return await response.json();
      } catch (err) {
        console.error("報價抓取失敗", err);
        return {};
      }
    }
    
    // 初始化
    loadData('default_user');
  </script>
</body>
</html>
