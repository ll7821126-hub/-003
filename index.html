<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <title>台灣股市客戶持倉追蹤系統 (AI 實時版)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-body: #f3f4f6;
      --bg-card: #ffffff;
      --primary: #10b981;
      --primary-hover: #059669;
      --text-main: #1f2937;
      --text-sub: #6b7280;
      --border: #e5e7eb;

      --up-color: #ef4444;
      --up-bg: #fee2e2;
      --down-color: #10b981;
      --down-bg: #d1fae5;

      --recommend-bg: #eff6ff;
      --recommend-tag-bg: #dbeafe;
      --recommend-tag-text: #1e40af;

      --radius: 12px;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:'Inter','Noto Sans TC',sans-serif;
      background-color:var(--bg-body);
      color:var(--text-main);
      padding:20px;
      height:100vh;
      overflow:hidden;
    }
    .layout-container{
      display:grid;
      grid-template-columns:320px 1fr;
      gap:24px;
      max-width:1600px;
      margin:0 auto;
      height:calc(100vh - 40px);
    }
    .sidebar{
      background:var(--bg-card);
      border-radius:var(--radius);
      padding:24px;
      box-shadow:var(--shadow);
      overflow-y:auto;
      height:100%;
      border:1px solid var(--border);
      display:flex;
      flex-direction:column;
    }
    .main-content{
      display:flex;
      flex-direction:column;
      gap:20px;
      height:100%;
      overflow:hidden;
    }
    .top-bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:var(--bg-card);
      padding:16px 24px;
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      flex-shrink:0;
    }
    .page-title{
      font-size:20px;
      font-weight:800;
      color:#111827;
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }
    .search-wrapper{position:relative;width:320px;margin-left:20px}
    .search-input{
      width:100%;
      padding:8px 16px 8px 36px;
      border-radius:99px;
      border:1px solid #d1d5db;
      background:#f9fafb;
      font-size:13px;
      outline:none;
      transition:.2s;
    }
    .search-input:focus{
      background:#fff;
      border-color:var(--primary);
      box-shadow:0 0 0 3px rgba(16,185,129,.15);
    }
    .search-icon{
      position:absolute;
      left:12px;
      top:50%;
      transform:translateY(-50%);
      font-size:14px;
      color:#9ca3af;
    }
    .cards-container{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
      gap:16px;
      flex-shrink:0;
      padding-bottom:4px;
    }
    .client-card{
      background:var(--bg-card);
      border-radius:16px;
      padding:20px;
      box-shadow:0 4px 20px rgba(0,0,0,.04);
      border:1px solid #f3f4f6;
      transition:.2s;
      display:flex;
      flex-direction:column;
    }
    .client-card:hover{
      transform:translateY(-2px);
      box-shadow:0 10px 25px rgba(0,0,0,.08);
    }
    .cc-header{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      margin-bottom:12px;
    }
    .cc-name{font-size:18px;font-weight:800;color:#111827}
    .cc-rate{font-size:16px;font-weight:700}
    .cc-body{
      flex:1;
      display:flex;
      flex-direction:column;
      gap:6px;
      margin-bottom:16px;
    }
    .cc-info-text{font-size:13px;color:#6b7280}
    .cc-row{
      font-size:14px;
      color:#374151;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .cc-label{color:#6b7280;font-size:13px;min-width:70px}
    .cc-value{font-weight:600;color:#111827}
    .cc-actions{display:flex;gap:10px}
    .cc-btn{
      flex:1;
      padding:8px 0;
      border-radius:99px;
      border:1px solid #e5e7eb;
      background:#fff;
      color:#374151;
      font-size:13px;
      font-weight:500;
      cursor:pointer;
      transition:.2s;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .cc-btn:hover{background:#f9fafb;border-color:#d1d5db}
    .cc-btn.ai{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8}
    .cc-btn.ai:hover{background:#dbeafe}

    .table-container{
      background:var(--bg-card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      flex-grow:1;
      overflow:auto;
      border:1px solid var(--border);
    }
    table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px}
    thead{background:#f9fafb;position:sticky;top:0;z-index:10}
    th{
      text-align:right;
      padding:14px 12px;
      font-weight:600;
      color:#6b7280;
      white-space:nowrap;
      border-bottom:1px solid #e5e7eb;
    }
    th.t-left{text-align:left}
    td{
      padding:14px 12px;
      text-align:right;
      color:#374151;
      vertical-align:middle;
    }
    td.t-left{text-align:left}
    tbody tr td{border-bottom:1px solid #e5e7eb}
    tbody tr:last-child td{border-bottom:none}

    .stock-link{
      color:#2563eb;
      text-decoration:none;
      font-weight:600;
      transition:.2s;
    }
    .stock-link:hover{
      color:#1d4ed8;
      text-decoration:underline;
    }

    tr.is-recommend td{background-color:var(--recommend-bg)}
    .tag-recommend{
      font-size:11px;
      background:var(--recommend-tag-bg);
      color:var(--recommend-tag-text);
      padding:2px 6px;
      border-radius:4px;
      margin-right:6px;
      font-weight:700;
    }
    tr.group-row td{
      background:#f0fdf4;
      color:#065f46;
      font-weight:700;
      text-align:left;
      padding:12px 14px;
      border-top:1px solid #e5e7eb;
      border-bottom:1px solid #e5e7eb;
    }

    .color-up{color:var(--up-color)!important;font-weight:600}
    .color-down{color:var(--down-color)!important;font-weight:600}
    .badge-up{
      background:var(--up-bg);
      color:var(--up-color);
      padding:2px 8px;
      border-radius:99px;
      font-weight:700;
      font-size:12px;
    }
    .badge-down{
      background:var(--down-bg);
      color:var(--down-color);
      padding:2px 8px;
      border-radius:99px;
      font-weight:700;
      font-size:12px;
    }

    .form-group{margin-bottom:16px}
    .form-group label{
      display:block;
      font-size:13px;
      font-weight:500;
      color:var(--text-sub);
      margin-bottom:6px;
    }
    input,select,textarea{
      width:100%;
      padding:10px 12px;
      border:1px solid #d1d5db;
      border-radius:8px;
      font-size:14px;
      outline:none;
      transition:.2s;
      background:#fff;
    }
    input:focus,select:focus,textarea:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 3px rgba(16,185,129,.15);
    }

    .btn{
      cursor:pointer;
      border:none;
      padding:8px 16px;
      border-radius:8px;
      font-size:13px;
      font-weight:600;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      transition:.2s;
    }
    .btn-save{
      background:var(--primary);
      color:#fff;
      width:100%;
      padding:12px;
      font-size:15px;
      border-radius:99px;
      box-shadow:0 4px 10px rgba(16,185,129,.25);
    }
    .btn-save:hover{background:var(--primary-hover);transform:translateY(-1px)}
    .btn-ghost{background:#f3f4f6;color:#4b5563}
    .btn-ghost:hover{background:#e5e7eb}
    .btn-clear{
      background:#fee2e2;
      color:#b91c1c;
      font-size:13px;
      padding:10px;
      border-radius:99px;
      width:100%;
    }
    .btn-reset{
      background:#f3f4f6;
      color:#4b5563;
      font-size:13px;
      padding:10px;
      border-radius:99px;
      width:100%;
    }

    .action-group{display:flex;gap:6px;justify-content:flex-end}
    .icon-btn{
      width:28px;
      height:28px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:6px;
      border:1px solid #e5e7eb;
      background:#fff;
      color:#6b7280;
      font-size:14px;
      cursor:pointer;
      transition:.2s;
    }
    .icon-btn:hover{
      background:#f9fafb;
      color:#374151;
      border-color:#d1d5db;
    }
    .icon-btn.del:hover{
      background:#fee2e2;
      color:#b91c1c;
      border-color:#fecaca;
    }

    .switch-label{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:13px;
      color:#4b5563;
      cursor:pointer;
      background:#fff;
      padding:6px 12px;
      border-radius:99px;
      border:1px solid #e5e7eb;
      user-select:none;
    }
    .switch-label:hover{background:#f9fafb}
    .switch-label input{width:auto;margin:0}

    .modal-overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.5);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:100;
      backdrop-filter:blur(3px);
    }
    .modal{
      background:#fff;
      width:600px;
      max-width:90%;
      max-height:90vh;
      border-radius:20px;
      padding:30px;
      box-shadow:0 25px 50px -12px rgba(0,0,0,.25);
      overflow-y:auto;
      animation:popIn .2s;
    }
    @keyframes popIn{
      from{transform:scale(.95);opacity:0}
      to{transform:scale(1);opacity:1}
    }

    .profile-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:24px;
    }
    .profile-title{font-size:20px;font-weight:800;color:#111827}
    .btn-close{
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:99px;
      padding:6px 16px;
      font-size:13px;
      color:#6b7280;
      cursor:pointer;
    }
    .btn-close:hover{background:#f9fafb;color:#374151}
    .profile-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
    }
    .profile-item label{
      display:block;
      font-size:13px;
      color:#4b5563;
      font-weight:500;
      margin-bottom:6px;
    }
    .profile-item.full{grid-column:span 2}
    .profile-footer{
      margin-top:30px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding-top:20px;
      border-top:1px solid #f3f4f6;
    }
    .btn-profile-save{
      background:#eff6ff;
      color:#2563eb;
      border:1px solid #bfdbfe;
      padding:8px 24px;
      border-radius:99px;
      font-weight:600;
      cursor:pointer;
      transition:.2s;
    }
    .btn-profile-save:hover{background:#dbeafe}

    .ai-box{
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:12px;
      padding:20px;
      margin-bottom:16px;
      box-shadow:0 2px 8px rgba(0,0,0,.03);
    }
    .ai-header{
      display:flex;
      align-items:center;
      margin-bottom:12px;
      font-weight:700;
      font-size:16px;
      color:#111827;
      gap:8px;
    }
    .ai-content{
      font-size:14px;
      color:#374151;
      line-height:1.7;
      text-align:justify;
    }
    .ai-tag{
      display:inline-block;
      padding:2px 8px;
      border-radius:4px;
      font-size:12px;
      margin-right:6px;
      font-weight:600;
    }
    .tag-bull{background:#fee2e2;color:#b91c1c}
    .tag-bear{background:#d1fae5;color:#065f46}
    .tag-neu{background:#f3f4f6;color:#4b5563}

    /* Loading Animation */
    .ai-loading {
      text-align: center;
      padding: 40px;
      color: #6b7280;
      font-size: 15px;
      font-weight: 500;
    }
    .ai-loading-spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 3px solid rgba(16,185,129, 0.3);
      border-radius: 50%;
      border-top-color: #10b981;
      animation: spin 1s ease-in-out infinite;
      margin-bottom: 15px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<div class="layout-container">
  <aside class="sidebar">
    <h2 style="font-size:20px;font-weight:800;margin-bottom:24px;color:#111827;">新增 / 修改持倉</h2>
    <form id="holdForm">
      <input type="hidden" id="editId" />
      <div class="form-group">
        <label>客戶姓名</label>
        <input id="client" placeholder="例如：陳先生" required />
      </div>
      <div class="form-group">
        <label>股票名稱</label>
        <input id="stockName" placeholder="例如：台積電" required />
      </div>
      <div class="form-group">
        <label>證券代碼</label>
        <input id="code" placeholder="例如：2330" required />
      </div>
      <div class="form-group" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div>
          <label>持股數量</label>
          <input id="quantity" type="number" min="1" required />
        </div>
        <div>
          <label>買入價格 (NT$)</label>
          <input id="cost" type="number" step="0.1" required />
        </div>
      </div>
      <div class="form-group" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div>
          <label>止損價 (選填)</label>
          <input id="stopLoss" type="number" step="0.1" />
        </div>
        <div>
          <label>止盈價 (選填)</label>
          <input id="takeProfit" type="number" step="0.1" />
        </div>
      </div>
      <div class="form-group">
        <label>是否為推薦飆股</label>
        <select id="recommendType">
          <option value="no">否</option>
          <option value="yes">是 (列表高亮顯示)</option>
        </select>
      </div>
      <div style="margin-top:30px;">
        <button type="submit" class="btn btn-save" id="submitBtn">保存持倉</button>
      </div>
      <div style="margin-top:16px;display:flex;gap:10px;">
        <button type="button" class="btn btn-reset" onclick="resetForm()">清空表單</button>
        <button type="button" class="btn btn-clear" onclick="clearAllData()">清空所有</button>
      </div>
    </form>
  </aside>

  <main class="main-content">
    <header class="top-bar">
      <div class="page-title">
        持倉概覽 · 實時報價
        <div class="search-wrapper">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" class="search-input" placeholder="按股票名稱 / 代碼篩選...">
        </div>
      </div>

      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <span id="lastUpdate" style="font-size:12px;color:#6b7280;"></span>
        <label class="switch-label">
          <input type="checkbox" id="autoRefreshCheck" onchange="toggleAutoRefresh()">
          <span>自動刷新 (10秒)</span>
        </label>
        <button class="btn btn-ghost btn-sm" id="refreshBtn" onclick="realRefresh()">🔄 刷新行情</button>
        <button class="btn btn-ghost btn-sm" onclick="exportCSV()">📥 導出</button>
      </div>
    </header>

    <div id="clientCards" class="cards-container"></div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th class="t-left">股票</th>
            <th>代碼</th>
            <th>數量</th>
            <th>成本價</th>
            <th>止損 / 止盈</th>
            <th>現價</th>
            <th>市值</th>
            <th>盈虧</th>
            <th>收益率</th>
            <th style="padding-right:24px;">操作</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div id="emptyTip" style="padding:60px 20px;text-align:center;color:#9ca3af;display:none;">
        <div style="font-size:40px;margin-bottom:10px;">📊</div>
        <div>暫無數據，請在左側添加持倉記錄</div>
      </div>
    </div>
  </main>
</div>

<!-- AI 分析 Modal -->
<div id="aiModal" class="modal-overlay">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <h3 style="font-size:20px;font-weight:800;margin:0;color:#111827;" id="aiModalTitle">AI 深度解析</h3>
      <button onclick="document.getElementById('aiModal').style.display='none'" class="btn btn-ghost" style="border-radius:99px;">✕</button>
    </div>
    <div id="aiModalContent" style="padding-bottom:20px;"></div>
  </div>
</div>

<!-- 客戶檔案 Modal -->
<div id="profileModal" class="modal-overlay">
  <div class="modal">
    <div class="profile-header">
      <div class="profile-title" id="p_title">客戶檔案</div>
      <button class="btn-close" onclick="document.getElementById('profileModal').style.display = 'none'">關閉</button>
    </div>
    <input type="hidden" id="p_clientName">
    <div class="profile-grid">
      <div class="profile-item full">
        <label>客戶姓名</label>
        <div id="p_displayName" style="font-size:16px;font-weight:700;color:#111827;"></div>
      </div>
      <div class="profile-item"><label>性別</label><select id="p_gender"><option value="">未填寫</option><option value="男">男</option><option value="女">女</option></select></div>
      <div class="profile-item"><label>年齡 (歲)</label><input id="p_age" type="text" placeholder="例如：46"></div>
      <div class="profile-item"><label>股齡</label><input id="p_experience" placeholder="例如：新手 / 2年"></div>
      <div class="profile-item"><label>操作方式</label><input id="p_style" placeholder="例如：短線 / 長線"></div>
      <div class="profile-item full"><label>興趣愛好</label><input id="p_hobbies" placeholder="例如：足球 / 旅遊 / 攝影等"></div>
      <div class="profile-item full"><label>家庭情況</label><input id="p_family" placeholder="例如：已婚三個孩子 / 獨居等"></div>
      <div class="profile-item full"><label>備註 (選填)</label><textarea id="p_note" rows="3" placeholder="例如：風險承受能力、職業、收入穩定性等"></textarea></div>
    </div>
    <div class="profile-footer">
      <div class="profile-tip">客戶檔案信息會同步至雲端，後台也可查看</div>
      <button class="btn-profile-save" onclick="saveProfile()">保存檔案</button>
    </div>
  </div>
</div>

<script>
  // 後端 API base URL
  const API_URL = "https://003-v2.onrender.com/api";

  const DB_KEY = "korea_stock_v13_sync";
  const PROFILE_KEY = "korea_profile_v13_sync";

  const form = document.getElementById("holdForm");
  const tableBody = document.getElementById("tableBody");
  const cardsContainer = document.getElementById("clientCards");
  const emptyTip = document.getElementById("emptyTip");
  const searchInput = document.getElementById("searchInput");
  const lastUpdateEl = document.getElementById("lastUpdate");

  let holdings = [];
  let profiles = {};
  let autoTimer = null;

  // 建立 / 讀取本機 userId
  let userId = localStorage.getItem("app_user_id");
  if (!userId) {
    userId = "user_" + Date.now() + "_" + Math.random().toString(36).substr(2, 9);
    localStorage.setItem("app_user_id", userId);
  }

  // 從 localStorage 初始化
  try {
    holdings = JSON.parse(localStorage.getItem(DB_KEY) || "[]");
    profiles = JSON.parse(localStorage.getItem(PROFILE_KEY) || "{}");
  } catch (e) {
    holdings = [];
    profiles = {};
  }

  const fmtMoney = n => Number(n).toLocaleString("zh-TW", {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  });

  const fmtPct = n => {
    const s = Number(n).toFixed(2) + "%";
    return n > 0 ? "+" + s : s;
  };

  function getProfileForClient(name) {
    return profiles[name] || null;
  }

  // ---- 雲端 API：新增 / 更新 / 刪除 ----
  async function apiCreatePosition(item) {
    try {
      const clientProfile = getProfileForClient(item.client);
      await fetch(`${API_URL}/save_data`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          userId,
          client: item.client,
          stockName: item.stockName,
          code: item.code,
          quantity: item.quantity,
          cost: item.cost,
          stopLoss: item.stopLoss ? Number(item.stopLoss) : undefined,
          takeProfit: item.takeProfit ? Number(item.takeProfit) : undefined,
          recommendType: item.recommendType || 'no',
          clientProfile
        })
      });
    } catch (err) {
      console.error('新增時同步雲端失敗', err);
    }
  }

  async function apiUpdatePosition(item) {
    try {
      const clientProfile = getProfileForClient(item.client);
      await fetch(`${API_URL}/update_position`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({

  // ---- 主畫面渲染 ----
  function render() {
    const groups = {};
    let hasData = false;

    holdings.forEach(h => {
      const stockName = (h.stockName || "").toLowerCase();
      const code = String(h.code || "");
      if (!stockName.includes(filterText) && !code.includes(filterText)) return;

      hasData = true;
      const client = h.client || "未命名客戶";

      if (!groups[client]) groups[client] = { items: [], cost:0, val:0, qty:0, count:0 };

      const cur = (h.currentPrice !== null && h.currentPrice !== undefined)
        ? Number(h.currentPrice)
        : Number(h.cost);
      const qty = Number(h.quantity) || 0;
      const cost = Number(h.cost) || 0;

      groups[client].items.push({...h, cur});
      groups[client].cost += cost * qty;
      groups[client].val += cur * qty;
      groups[client].qty += qty;
      groups[client].count += 1;
    });

    if(!hasData) {
      emptyTip.style.display = "block";
      cardsContainer.innerHTML = "";
      tableBody.innerHTML = "";
      return;
    }
    emptyTip.style.display = "none";

    // ---- 客戶卡片 ----
    cardsContainer.innerHTML = "";
    Object.keys(groups).sort().forEach(client => {
      const g = groups[client];
      const pnl = g.val - g.cost;
      const rate = g.cost ? (pnl/g.cost)*100 : 0;
      const pnlClass = pnl >= 0 ? "color-up" : "color-down";

      const p = profiles[client] || {};
      const details = [p.gender, p.experience, p.style].filter(v => v && v.trim() !== "");
      const profileText = details.length > 0 ? details.join(" / ") : "未填";

      const card = document.createElement("div");
      card.className = "client-card";
      card.innerHTML = `
        <div class="cc-header">
          <div class="cc-name">${client}</div>
          <div class="cc-rate ${pnlClass}">${fmtPct(rate)}</div>
        </div>
        <div class="cc-body">
          <div class="cc-info-text" style="color:#4f46e5;font-weight:500;">檔案: ${profileText}</div>
          <div class="cc-info-text">基本信息: ${g.count} 只股票 / 合計 ${g.qty} 股</div>
          <div class="cc-row" style="margin-top:6px;">
            <div class="cc-label">總投入</div>
            <div class="cc-value">NT$ ${fmtMoney(g.cost)}</div>
          </div>
          <div class="cc-row">
            <div class="cc-label">總市值</div>
            <div class="cc-value">NT$ ${fmtMoney(g.val)}</div>
          </div>
          <div class="cc-row">
            <div class="cc-label">總盈虧</div>
            <div class="cc-value ${pnlClass}">NT$ ${fmtMoney(pnl)}</div>
          </div>
        </div>
        <div class="cc-actions">
          <button class="cc-btn" onclick="openProfile('${client}')">客戶檔案</button>
          <button class="cc-btn ai" onclick="aiAnalyzePortfolio('${client}')">AI 解析建議</button>
        </div>
      `;
      cardsContainer.appendChild(card);
    });

    // ---- 詳細表格 ----
    tableBody.innerHTML = "";
    Object.keys(groups).sort().forEach(client => {
      const g = groups[client];
      const pnl = g.val - g.cost;
      const rate = g.cost ? (pnl/g.cost)*100 : 0;
      const pnlClass = pnl >= 0 ? "color-up" : "color-down";

      const headRow = document.createElement("tr");
      headRow.className = "group-row";
      headRow.innerHTML = `<td colspan="11">${client} | 投入 NT$ ${fmtMoney(g.cost)} | 盈虧 <span class="${pnlClass}">NT$ ${fmtMoney(pnl)} (${fmtPct(rate)})</span></td>`;
      tableBody.appendChild(headRow);

      g.items.forEach(item => {
        const val = item.cur * item.quantity;
        const itemPnl = val - (item.cost * item.quantity);
        const itemRate = (item.cost * item.quantity) ? (itemPnl / (item.cost * item.quantity)) * 100 : 0;
        const itemClass = itemPnl >= 0 ? "badge-up" : "badge-down";
        const pnlTextClass = itemPnl >= 0 ? "color-up" : "color-down";
        const isRec = item.recommendType === 'yes';

        const tr = document.createElement("tr");
        if(isRec) tr.className = "is-recommend";

        tr.innerHTML = `
          <td class="t-left">
            ${isRec ? '<span class="tag-recommend">推薦</span>' : ''}
            <a href="https://tw.stock.yahoo.com/quote/${item.code}" target="_blank" class="stock-link">
              ${item.stockName}
            </a>
          </td>
          <td>${item.code}</td>
          <td>${fmtMoney(item.quantity)}</td>
          <td>${fmtMoney(item.cost)}</td>
          <td style="font-size:12px;color:#9ca3af;">${item.stopLoss ? '損:'+item.stopLoss : '-'} / ${item.takeProfit ? '盈:'+item.takeProfit : '-'}</td>
          <td style="font-weight:600">${fmtMoney(item.cur)}</td>
          <td>${fmtMoney(val)}</td>
          <td class="${pnlTextClass}">${fmtMoney(itemPnl)}</td>
          <td><span class="${itemClass}">${fmtPct(itemRate)}</span></td>
          <td style="padding-right:24px;">
            <div class="action-group">
              <button class="icon-btn" onclick="aiAnalyzeStock('${item.id}')" title="AI解析">🤖</button>
              <button class="icon-btn" onclick="editItem('${item.id}')" title="編輯">✏️</button>

  function toggleAutoRefresh() {

      clearInterval(autoTimer);

  // ==== ★ 抓價：呼叫後端 /api/prices ====
  window.realRefresh = async () => {
    if (!holdings.length) {
      render();
      return;
    }
    const refreshBtn = document.getElementById('refreshBtn');
    const originalText = refreshBtn.innerText;
    refreshBtn.innerText = "⌛ 更新中...";
    refreshBtn.disabled = true;

    try {
      const codes = [...new Set(
        holdings
          .map(h => (h.code || '').toString().trim())
          .filter(Boolean)
      )];

      if (!codes.length) {
        refreshBtn.innerText = originalText;
        refreshBtn.disabled = false;
        return;
      }

      const response = await fetch(`${API_URL}/prices?t=${Date.now()}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ codes })
      });

      if (!response.ok) throw new Error("網路錯誤：" + response.status);
      const prices = await response.json();

      holdings = holdings.map(h => {
        const key = (h.code || '').toString().trim();
        const price = prices[key];
        if (price !== undefined && price !== null) {
          return { ...h, currentPrice: price };
        }
        return h;
      });

      await save();
      if (lastUpdateEl) {
        lastUpdateEl.innerText = `最後更新：${new Date().toLocaleTimeString('zh-TW')}`;
      }
    } catch (error) {
      console.error("刷新失敗:", error);
      alert("無法連接伺服器，請稍後再試");
    } finally {
      refreshBtn.innerText = originalText;
      refreshBtn.disabled = false;
    }
  };

  // ---- 從雲端載入初始資料 ----
  async function loadFromCloud() {
    try {
      const res = await fetch(`${API_URL}/get_data?userId=${encodeURIComponent(userId)}`);
      if (!res.ok) {
        console.warn('載入雲端資料失敗，使用本機資料');
        render();
        return;
      }
      const data = await res.json();

      if (Array.isArray(data) && data.length) {
        holdings = data.map(h => ({
          id: h._id || `${h.code}_${h.createdAt || Date.now()}`,
          client: h.client,
          stockName: h.stockName,
          code: h.code,
          quantity: h.quantity,
          cost: h.cost,
          stopLoss: h.stopLoss,
          takeProfit: h.takeProfit,
          recommendType: h.recommendType || 'no',
          currentPrice: h.currentPrice ?? h.cost
        }));

        profiles = {};
        data.forEach(h => {
          if (h.clientProfile && h.client) {
            profiles[h.client] = h.clientProfile;
          }
        });

        localStorage.setItem(DB_KEY, JSON.stringify(holdings));
        localStorage.setItem(PROFILE_KEY, JSON.stringify(profiles));
      }
      render();
    } catch (err) {
      console.error('載入雲端資料異常', err);
      render();
    }
  }

  // ---- 表單提交：新增 / 加倉 / 編輯 ----
  form.addEventListener("submit", async e => {
    e.preventDefault();
    const clientVal = document.getElementById("client").value.trim();
    const stockVal = document.getElementById("stockName").value.trim();
    const codeVal = document.getElementById("code").value.trim();
    const qtyVal = document.getElementById("quantity").value;
    const costVal = document.getElementById("cost").value;

    if(!clientVal || !stockVal || !codeVal || !qtyVal || !costVal) {
      alert("請填寫必填項");
      return;
    }

    const id = document.getElementById("editId").value;

    const newItem = {
      id: id || Date.now().toString(),
      client: clientVal,
      stockName: stockVal,
      code: codeVal,
      quantity: Number(qtyVal),
      cost: Number(costVal),
      stopLoss: document.getElementById("stopLoss").value,
      takeProfit: document.getElementById("takeProfit").value,
      recommendType: document.getElementById("recommendType").value,
      currentPrice: Number(costVal)
    };

    if (id) {
      const idx = holdings.findIndex(h => h.id === id);
      if (idx > -1) {
        newItem.currentPrice = holdings[idx].currentPrice ?? newItem.currentPrice;
        holdings[idx] = newItem;
        await apiUpdatePosition(newItem);
      }
    } else {
      const existingIndex = holdings.findIndex(
        h => h.client === newItem.client && h.code === newItem.code
      );

      if (existingIndex > -1) {
        const old = holdings[existingIndex];

        const oldQty = Number(old.quantity) || 0;
        const oldCost = Number(old.cost) || 0;
        const addQty = Number(newItem.quantity) || 0;
        const addCost = Number(newItem.cost) || 0;

        const totalQty = oldQty + addQty;
        const totalCostAmount = oldQty * oldCost + addQty * addCost;
        const avgCost = totalQty > 0 ? totalCostAmount / totalQty : oldCost;

        const merged = {
          ...old,
          quantity: totalQty,
          cost: Number(avgCost.toFixed(2)),
          stopLoss: newItem.stopLoss || old.stopLoss,
          takeProfit: newItem.takeProfit || old.takeProfit,
          recommendType: newItem.recommendType || old.recommendType || 'no',
          currentPrice: old.currentPrice ?? newItem.currentPrice
        };

        holdings[existingIndex] = merged;
        await apiUpdatePosition(merged);
      } else {
        holdings.push(newItem);
        await apiCreatePosition(newItem);
      }
    }

    await save();
    resetForm();
    if(searchInput.value) {
      searchInput.value = "";
      filterText = "";
      render();
    }
  });

      const pnl = (cur - h.cost) * h.quantity;
      const rate = ((cur - h.cost)/h.cost)*100;
      csv += `${h.client},${h.stockName},${h.code},${h.quantity},${h.cost},${cur},${pnl.toFixed(2)},${rate.toFixed(2)}%\n`;
    });
    const blob = new Blob(["\uFEFF"+csv], {type: 'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "持倉報表.csv";
    a.click();
  };

  // 點擊空白區關閉 modal
  window.onclick = (e) => {
    if(e.target.className === "modal-overlay") e.target.style.display = "none";
  };

  // ---- 初始化 ----
  loadFromCloud();
</script>
</body>
</html>
